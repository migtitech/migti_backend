name: Production Deployment Pipeline

on:
  push:
    branches:
      - prod

concurrency:
  group: production-backend-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, format check, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint check
        run: npm run lint:check

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to production server
    needs: ci
    runs-on: [self-hosted, linux, migti-prod]
    environment: production

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=0

          check_required() {
            if [ -z "${!1}" ]; then
              echo "::error::Missing required secret: $1"
              missing=1
            fi
          }

          check_required DEPLOY_PATH
          check_required DEPLOY_BRANCH
          check_required PM2_APP_NAME
          check_required PROD_ENV_FILE

          exit $missing

      - name: Deploy on server
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd "$DEPLOY_PATH"

          printf '%s\n' "$PROD_ENV_FILE" > .env
          chmod 600 .env

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"
          git clean -fd

          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"

          NODE_ENV=development npm install -f

          echo "Running build..."
          npm run build

          if ! command -v pm2 > /dev/null 2>&1; then
            npm install -g pm2
          fi

          echo "Restarting PM2 app: $PM2_APP_NAME"
          if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
            pm2 restart "$PM2_APP_NAME" --update-env
          else
            pm2 start dist/index.js --name "$PM2_APP_NAME" --update-env
          fi

          pm2 save
          pm2 status "$PM2_APP_NAME"
