name: Production Deployment Pipeline

on:
  push:
    branches:
      - prod

concurrency:
  group: production-backend-deploy
  cancel-in-progress: false

jobs:
  ci-cd:
    name: CI and Deploy
    runs-on: [self-hosted, linux, migti-prod]
    environment: production

    steps:
      - name: CI checks and deploy
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail

          for secret_name in PROD_ENV_FILE DEPLOY_PATH DEPLOY_BRANCH PM2_APP_NAME; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: $secret_name"
              exit 1
            fi
          done

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd "$DEPLOY_PATH"

          printf '%s\n' "$PROD_ENV_FILE" > .env
          chmod 600 .env

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"
          git clean -fd

          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"

          echo "=== CI: Installing dependencies ==="
          NODE_ENV=development npm install -f

          echo "=== CI: Prettier check ==="
          npm run format:check

          echo "=== CI: ESLint check ==="
          npm run lint:check

          echo "=== CI: Build ==="
          npm run build

          echo "=== CD: Restarting application ==="
          if ! command -v pm2 > /dev/null 2>&1; then
            npm install -g pm2
          fi

          if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
            pm2 restart "$PM2_APP_NAME" --update-env
          else
            pm2 start dist/index.js --name "$PM2_APP_NAME" --update-env
          fi

          pm2 save
          pm2 status "$PM2_APP_NAME"
          echo "=== CI/CD completed successfully ==="
