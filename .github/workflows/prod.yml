name: Production Deployment Pipeline

on:
  push:
    branches:
      - prod

concurrency:
  group: production-backend-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, format check, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint check
        run: npm run lint:check

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to production server
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deploy secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=0

          check_required() {
            if [ -z "${!1}" ]; then
              echo "::error::Missing required secret: $1"
              missing=1
            fi
          }

          check_required SERVER_HOST
          check_required SERVER_USERNAME
          check_required SERVER_PORT
          check_required DEPLOY_PATH
          check_required DEPLOY_BRANCH
          check_required PM2_APP_NAME
          check_required PROD_ENV_FILE

          if [ -z "$SERVER_PASSWORD" ] && [ -z "$SERVER_SSH_KEY" ]; then
            echo "::error::Set either SERVER_PASSWORD or SERVER_SSH_KEY"
            missing=1
          fi

          exit $missing

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: PROD_ENV_FILE,DEPLOY_PATH,DEPLOY_BRANCH,PM2_APP_NAME
          script_stop: true
          script: |
            set -euo pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd "$DEPLOY_PATH"

            printf '%s\n' "$PROD_ENV_FILE" > .env
            chmod 600 .env

            git checkout "$DEPLOY_BRANCH"
            git stash push -m "deploy-stash" || true
            git pull origin "$DEPLOY_BRANCH"
            git stash pop || true
            git reset --hard "origin/$DEPLOY_BRANCH"
            git clean -fd

            npm install -f

            if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_APP_NAME"
            else
              pm2 start npm --name "$PM2_APP_NAME" -- start
            fi

            pm2 save
