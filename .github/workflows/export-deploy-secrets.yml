name: Export deploy secrets
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - run: |
          python3 - <<'PY'
          import json, os
          keys = ["PROD_ENV_FILE","DEPLOY_PATH","DEPLOY_BRANCH","PM2_APP_NAME"]
          data = {k: os.environ.get(k, "") for k in keys}
          open("deploy-secrets.json","w").write(json.dumps(data))
          PY
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-secrets
          path: deploy-secrets.json
          retention-days: 1
