name: Sync Secrets to migtitech01

on:
  workflow_dispatch:

jobs:
  export-backend-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Export secrets artifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          ENV: ${{ secrets.ENV }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          PORT: ${{ secrets.PORT }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          keys = [
              "AWS_ACCESS_KEY_ID","AWS_BUCKET_NAME","AWS_REGION","AWS_SECRET_ACCESS_KEY",
              "DEPLOY_BRANCH","DEPLOY_PATH","DOCKER_PASSWORD","DOCKER_USERNAME","ENV",
              "MONGODB_URI","PM2_APP_NAME","PORT","PROD_ENV_FILE","SERVER_HOST",
              "SERVER_PASSWORD","SERVER_PORT","SERVER_SSH_KEY","SERVER_USER","SERVER_USERNAME"
          ]
          data = {k: os.environ.get(k, "") for k in keys}
          with open("backend-secrets.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          PY

      - name: Upload secrets bundle
        uses: actions/upload-artifact@v4
        with:
          name: backend-secrets-bundle
          path: backend-secrets.json
          retention-days: 1
