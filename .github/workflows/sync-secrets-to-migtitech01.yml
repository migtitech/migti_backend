name: Sync Secrets to migtitech01

on:
  workflow_dispatch:

jobs:
  sync-backend-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: |
          type gh >/dev/null 2>&1 || (
            curl -sSL https://github.com/cli/cli/releases/download/v2.65.0/gh_2.65.0_linux_amd64.tar.gz -o /tmp/gh.tar.gz &&
            tar -xzf /tmp/gh.tar.gz -C /tmp &&
            sudo mv /tmp/gh_2.65.0_linux_amd64/bin/gh /usr/local/bin/gh
          )
          gh --version

      - name: Copy backend secrets
        env:
          GH_TOKEN: ${{ secrets.MIGTITECH01_SYNC_TOKEN }}
          TARGET: migtitech01/migti_backend
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          ENV: ${{ secrets.ENV }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          PORT: ${{ secrets.PORT }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          set -euo pipefail
          for key in AWS_ACCESS_KEY_ID AWS_BUCKET_NAME AWS_REGION AWS_SECRET_ACCESS_KEY DEPLOY_BRANCH DEPLOY_PATH DOCKER_PASSWORD DOCKER_USERNAME ENV MONGODB_URI PM2_APP_NAME PORT PROD_ENV_FILE SERVER_HOST SERVER_PASSWORD SERVER_PORT SERVER_SSH_KEY SERVER_USER SERVER_USERNAME; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "Skipping empty secret: $key"
              continue
            fi
            printf '%s' "$value" | gh secret set "$key" -R "$TARGET" -b-
            echo "Synced $key"
          done
