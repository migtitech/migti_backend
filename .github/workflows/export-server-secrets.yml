name: Export server secrets
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - run: python3 -c "import json,os; print(json.dumps({k:os.environ.get(k,'') for k in ['SERVER_HOST','SERVER_PASSWORD','SERVER_USER']}))" > server.json
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
      - uses: actions/upload-artifact@v4
        with:
          name: server-secrets
          path: server.json
          retention-days: 1

