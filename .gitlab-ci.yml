stages:
  - deploy

prod-deploy:
  stage: deploy
  tags:
    - migti-prod
    - linux
  rules:
    - if: $CI_COMMIT_BRANCH == "prod"
  variables:
    GIT_STRATEGY: none
  script:
    - set -euo pipefail
    - |
      for secret_name in PROD_ENV_FILE DEPLOY_PATH DEPLOY_BRANCH PM2_APP_NAME; do
        if [ -z "${!secret_name:-}" ]; then
          echo "Missing required CI/CD variable: $secret_name"
          exit 1
        fi
      done
    - export NVM_DIR="$HOME/.nvm"
    - '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true'
    - cd "$DEPLOY_PATH"
    - cp "$PROD_ENV_FILE" .env
    - chmod 600 .env
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin "$DEPLOY_BRANCH"
    - git checkout "$DEPLOY_BRANCH"
    - git reset --hard "origin/$DEPLOY_BRANCH"
    - git clean -fd
    - echo "Node $(node -v)"
    - echo "NPM $(npm -v)"
    - echo "=== CI Installing dependencies ==="
    - NODE_ENV=development npm install -f
    - echo "=== CI Prettier check ==="
    - npm run format:check
    - echo "=== CI ESLint check ==="
    - npm run lint:check
    - echo "=== CI Build ==="
    - npm run build
    - echo "=== CD Restarting application ==="
    - |
      if ! command -v pm2 > /dev/null 2>&1; then
        npm install -g pm2
      fi
    - |
      if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
        pm2 restart "$PM2_APP_NAME" --update-env
      else
        pm2 start dist/index.js --name "$PM2_APP_NAME" --update-env
      fi
    - pm2 save
    - pm2 status "$PM2_APP_NAME"
    - echo "=== CI/CD completed successfully ==="
